name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v 1.15.2

      - name: Prebuild Expo
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile and boost checksum
        run: |
          # Remove bad keyword
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile || true

          # Find and patch boost podspec checksum
          for PODSPEC in $(find /Users/runner/work -name "boost.podspec" 2>/dev/null); do
            echo "Patching: $PODSPEC"
            sed -i '' 's/d879f21a81d8ab3b24a28820a27a2ef937263ecc2d17d02f496a25ac174a165b/6478edfe2f3305127cffe8caf73ea0176c53769f4bf1585be237eb30798c3b8e/' "$PODSPEC" || true
          done

          # Also patch in node_modules directly
          for PODSPEC in $(find /Users/runner/work -path "*/third-party-podspecs/boost.podspec" 2>/dev/null); do
            echo "Patching node_modules boost: $PODSPEC"
            sed -i '' 's/d879f21a81d8ab3b24a28820a27a2ef937263ecc2d17d02f496a25ac174a165b/6478edfe2f3305127cffe8caf73ea0176c53769f4bf1585be237eb30798c3b8e/' "$PODSPEC" || true
          done

      - name: Clear all caches
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/CocoaPods
          cd ios
          rm -rf Pods Podfile.lock

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace AniKage.xcworkspace \
            -scheme AniKage \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/AniKage.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          cp -r "$RUNNER_TEMP/AniKage.xcarchive/Products/Applications/AniKage.app" $RUNNER_TEMP/ipa/
          cd $RUNNER_TEMP/ipa
          mkdir Payload
          cp -r AniKage.app Payload/
          zip -r AniKage.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AniKage-IPA
          path: ${{ runner.temp }}/ipa/AniKage.ipa
          retention-days: 30
