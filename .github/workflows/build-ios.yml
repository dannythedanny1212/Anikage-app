name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v 1.15.2

      - name: Prebuild Expo
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile
        run: |
          cd ios

          # 1. Remove privacy keyword that old CocoaPods chokes on
          sed -i '' '/:privacy_file_aggregation_enabled/d' Podfile || true

          # 2. Remove any conflicting modular header directives
          sed -i '' '/use_modular_headers!/d' Podfile || true

          # 3. Inject targeted fix for the ExpoModulesCore/React-jsinspector
          #    Swift static library conflict — only enables modular headers
          #    for the specific pods that need it, not globally
          python3 - <<'PYTHON'
          import re

          with open('Podfile', 'r') as f:
              content = f.read()

          # Find the main target block and inject modular headers for specific pods
          injection = """
            pod 'React-jsinspector', :modular_headers => true
            pod 'React-Codegen', :modular_headers => true
          """

          # Insert before the last 'end' in the file
          content = content.rstrip()
          if "React-jsinspector" not in content:
              last_end = content.rfind('\nend')
              content = content[:last_end] + injection + content[last_end:]

          with open('Podfile', 'w') as f:
              f.write(content)

          print("Podfile patched successfully")
          PYTHON

      - name: Clear caches
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/CocoaPods
          cd ios && rm -rf Pods Podfile.lock

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace AniKage.xcworkspace \
            -scheme AniKage \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/AniKage.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CLANG_WARN_STRICT_PROTOTYPES=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_SWIFT_FLAGS="-Xfrontend -disable-reflection-metadata" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          cp -r "$RUNNER_TEMP/AniKage.xcarchive/Products/Applications/AniKage.app" $RUNNER_TEMP/ipa/
          cd $RUNNER_TEMP/ipa
          mkdir Payload
          cp -r AniKage.app Payload/
          zip -r AniKage.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AniKage-IPA
          path: ${{ runner.temp }}/ipa/AniKage.ipa
          retention-days: 30
