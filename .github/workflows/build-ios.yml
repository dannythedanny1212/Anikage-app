name: Build iOS IPA
# v2 - post_install only, no pod injection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v 1.15.2

      - name: Prebuild Expo
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile
        run: |
          cd ios
          sed -i '' '/:privacy_file_aggregation_enabled/d' Podfile || true
          sed -i '' '/use_modular_headers!/d' Podfile || true
          sed -i '' "/pod 'React-jsinspector'/d" Podfile || true

          ruby - <<'RUBY'
          podfile = File.read('Podfile')

          post_install = <<~'HOOK'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CLANG_ENABLE_MODULE_DEBUGGING'] = 'NO'
                config.build_settings['CLANG_MODULES_AUTOLINK'] = 'NO'
              end
              if target.name == 'React-jsinspector'
                target.build_configurations.each do |config|
                  config.build_settings['DEFINES_MODULE'] = 'YES'
                  config.build_settings['CLANG_ENABLE_MODULES'] = 'YES'
                end
              end
              if ['ReactCommon', 'React-RCTAppDelegate', 'React-RuntimeApple'].include?(target.name)
                target.build_configurations.each do |config|
                  config.build_settings['DEFINES_MODULE'] = 'NO'
                  config.build_settings['CLANG_ENABLE_MODULES'] = 'NO'
                  config.build_settings['CLANG_ENABLE_MODULE_DEBUGGING'] = 'NO'
                end
              end
            end
          end
          HOOK

          unless podfile.include?('post_install do |installer|')
            podfile += post_install
          end

          File.write('Podfile', podfile)
          puts "Patched"
          RUBY

      - name: Clear caches
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/CocoaPods
          cd ios && rm -rf Pods Podfile.lock

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace AniKage.xcworkspace \
            -scheme AniKage \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/AniKage.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            CLANG_ENABLE_MODULE_DEBUGGING=NO \
            CLANG_MODULES_AUTOLINK=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          cp -r "$RUNNER_TEMP/AniKage.xcarchive/Products/Applications/AniKage.app" $RUNNER_TEMP/ipa/
          cd $RUNNER_TEMP/ipa
          mkdir Payload
          cp -r AniKage.app Payload/
          zip -r AniKage.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AniKage-IPA
          path: ${{ runner.temp }}/ipa/AniKage.ipa
          retention-days: 30
